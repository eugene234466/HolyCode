<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="HolyCode — Scripture written as code. Daily devotionals and coding challenges for developers of faith.">
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>{% block title %}HolyCode{% endblock %}</title>
</head>
<body>
    <div class="noise"></div>

    <nav class="navbar">
        <a href="/" class="brand">
            <span class="brand-cross">✦</span>
            HolyCode
        </a>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Today</a>
            <a href="/archive" class="{% if request.path == '/archive' %}active{% endif %}">Archive</a>
            <button class="notify-btn" id="notifyBtn">🔔 Notify Me</button>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p><span class="brand-cross">✦</span> HolyCode — Scripture as Code</p>
        <p class="footer-sub">Built for developers of faith. Daily at midnight.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
